[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "keyhole-sdk"
version = "0.4.1"
description = "Official public Python SDK for interacting with Keyhole governance runtimes"
authors = [
  { name = "Keyhole Solution Foundation" }
]
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Typing :: Typed",
]
dependencies = [
  "requests>=2.25",
  "pydantic>=2.0",
  "pyyaml>=5.0",
]

[project.urls]
Homepage = "https://github.com/Keyhole-Solution/keyhole-developer-kit"
Repository = "https://github.com/Keyhole-Solution/keyhole-developer-kit"
Documentation = "https://github.com/Keyhole-Solution/keyhole-developer-kit/tree/main/packages/python/keyhole-sdk"

[tool.setuptools.packages.find]
include = ["keyhole_sdk*"]
