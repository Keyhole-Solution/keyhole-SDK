services:
  keyhole-test-runtime:
    image: ${KEYHOLE_RUNTIME_IMAGE:-ghcr.io/keyhole-solution/keyhole-test-runtime}:${KEYHOLE_RUNTIME_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    networks:
      - proxy
    environment:
      # MCP governance gating (governed mode).
      # When KEYHOLE_MCP_URL and KEYHOLE_MCP_TOKEN are set, every POST /realize
      # is gate-checked through the Keyhole MCP governance surface before execution.
      # Without valid credentials the runtime operates in local-only mode.
      # Obtain credentials from the Keyhole tenant portal.
      KEYHOLE_MCP_URL: "${KEYHOLE_MCP_URL:-https://mcp.keyholesolution.com}"
      KEYHOLE_MCP_TOKEN: "${KEYHOLE_MCP_TOKEN}"
      KEYHOLE_MCP_RUN_TYPE: "${KEYHOLE_MCP_RUN_TYPE:-convergence.status.v0_1}"
      KEYHOLE_MCP_TIMEOUT: "${KEYHOLE_MCP_TIMEOUT:-10}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_PROXY_NETWORK:-proxy}"
      - "traefik.http.routers.keyhole-test-runtime.rule=Host(`${KEYHOLE_RUNTIME_HOST:-runtime.example.yourdomain.com}`)"
      - "traefik.http.routers.keyhole-test-runtime.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.keyhole-test-runtime.tls=true"
      - "traefik.http.routers.keyhole-test-runtime.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.keyhole-test-runtime.service=keyhole-test-runtime"
      - "traefik.http.services.keyhole-test-runtime.loadbalancer.server.port=8080"
      - "traefik.http.services.keyhole-test-runtime.loadbalancer.server.scheme=http"

networks:
  proxy:
    external: true
    name: "${TRAEFIK_PROXY_NETWORK:-proxy}"
