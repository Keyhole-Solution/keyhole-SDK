services:
  keyhole-test-runtime:
    image: ${KEYHOLE_RUNTIME_IMAGE:-keyhole/test-runtime:local}
    build:
      context: ..
      dockerfile: services/test-runtime/Dockerfile
    ports:
      - "${KEYHOLE_RUNTIME_PORT:-8080}:8080"
    environment:
      KEYHOLE_RUNTIME_MODE: ${KEYHOLE_RUNTIME_MODE:-local-only}
      KEYHOLE_MCP_URL: ${KEYHOLE_MCP_URL:-}
      KEYHOLE_MCP_TOKEN: ${KEYHOLE_MCP_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
